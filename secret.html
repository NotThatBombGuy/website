<!DOCTYPE html>
<html>
	<head>
		<title>
			...
		</title>
		<style>
			body {
				background-color: #000;
  				min-height: 100vh;
			}

			.secret-top {
  				text-align: center;
			}

			.echo-wrapper {
  				position: relative;
  				display: inline-block; /* only as wide as the text */
			}

			.echo-text {
  				position: relative;
  				z-index: 1;              /* real text above ghosts */
  				text-decoration: none;
  				color: white;
  				font-size: 30pt;
				font-family: Roboto Slab;
			}

			.echo-clone {
  				position: absolute;
  				left: 0;
  				top: 0;
  				color: white;
  				font-size: 30pt;
  				pointer-events: none;    /* don't block clicks on the link */
  				white-space: nowrap;
  				z-index: 0;
				font-family: Roboto Slab;
			}
			.code-form {
  margin-top: 2rem;
  display: flex;
  justify-content: center;
  gap: 8px;
}

.code-input {
  background: transparent;
  border: 1px solid #444;
  color: white;
  font-size: 1rem;
  padding: 8px 12px;
  font-family: "Roboto Slab", serif;
  text-align: center;
  margin-top: 10%;
}

.code-input:focus {
  outline: none;
  border-color: #888;
}

.code-submit {
  background: #222;
  color: white;
  border: 1px solid #444;
  padding: 8px 12px;
  cursor: pointer;
  font-family: "Roboto Slab", serif;
  margin-top: 10%;
}

.code-message {
  color: #888;
  margin-top: 1rem;
  min-height: 1.5em;
}
.melvin-popup {
  margin: auto;
  max-width: 80vw;
  z-index: 10;
}
.psych-popup {
  margin: auto;
  max-width: 80vw;
  z-index: 10;
}
.doob-popup {
  margin: auto;
  width: 1000px;
  max-width: 90%;
  z-index: 10;
}	
	
		</style>
		<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
	</head>
	<body>
		<div class="secret-top">
			<div class="echo-wrapper">
			  <a href="./index.html" class="echo-text">return.</a>
			</div>
			<p>what are you doing here?</p>
			<form id="code-form" class="code-form">
			  <input
				type="text"
				id="code-input"
				class="code-input"
				placeholder="..."
				autocomplete="off"
			  />
			  <button type="submit" class="code-submit">enter</button>
			</form>
		  
			<p id="code-message" class="code-message"></p>
		  </div>
		<script src="secret.js"></script>
	</body>
